<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BosqueNegro — Sistema de Gestión</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --black: #1a1a18;
  --char: #2c2c28;
  --ash: #4a4a44;
  --smoke: #8a8a82;
  --mist: #c8c8be;
  --fog: #e8e8e0;
  --white: #f5f5ee;
  --paper: #fafaf5;
  --ember: #c85a20;
  --ember-l: #f8ede6;
  --gold: #c4880a;
  --gold-l: #fdf3dc;
  --green: #3a7a4a;
  --green-l: #e4f0e8;
  --blue: #2a5a8a;
  --blue-l: #e4eef8;
  --red: #b03020;
  --red-l: #fcecea;
  --fn: 'DM Mono', monospace;
  --fs: 'Fraunces', serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--black);font-family:var(--fn);font-size:13px;min-height:100vh;}

/* ── LOGIN ── */
#loginScreen {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:var(--char);
  padding:24px;
}
.login-logo {
  font-family:var(--fs);
  font-size:36px;
  font-style:italic;
  font-weight:300;
  color:var(--white);
  letter-spacing:0.01em;
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:12px;
}
.login-logo-dot{width:12px;height:12px;background:var(--ember);border-radius:50%;}
.login-sub{font-size:11px;color:var(--smoke);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:48px;}
.login-title{font-size:12px;color:var(--mist);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:20px;}
.role-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;width:100%;max-width:560px;}
.role-card {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  padding:24px 20px;
  cursor:pointer;
  transition:all 0.2s;
  text-align:center;
}
.role-card:hover{background:rgba(255,255,255,0.08);border-color:var(--ember);transform:translateY(-2px);}
.role-icon{font-size:28px;margin-bottom:12px;}
.role-name{font-size:13px;color:var(--white);font-weight:500;letter-spacing:0.05em;}
.role-desc{font-size:10px;color:var(--smoke);margin-top:6px;line-height:1.5;letter-spacing:0.04em;}

/* ── APP SHELL ── */
#appShell{display:none;flex-direction:column;min-height:100vh;}

/* ── HEADER ── */
.header{
  background:var(--char);
  height:52px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid #111;
}
.logo{font-family:var(--fs);font-size:18px;font-style:italic;font-weight:300;color:var(--white);display:flex;align-items:center;gap:10px;}
.logo-dot{width:8px;height:8px;background:var(--ember);border-radius:50%;flex-shrink:0;}
.header-right{display:flex;align-items:center;gap:14px;}
.sync-info{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--smoke);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.sync-dot.syncing{background:var(--gold);animation:blink 0.8s infinite;}
.sync-dot.error{background:var(--ember);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.role-badge{font-size:10px;color:var(--smoke);letter-spacing:0.08em;text-transform:uppercase;border:1px solid var(--ash);padding:3px 10px;}
.btn{background:transparent;border:1px solid var(--ash);color:var(--mist);font-family:var(--fn);font-size:11px;padding:6px 14px;cursor:pointer;letter-spacing:0.07em;transition:all 0.15s;}
.btn:hover{border-color:var(--ember);color:var(--ember);}
.btn:disabled{opacity:0.4;pointer-events:none;}
.btn.primary{background:var(--ember);border-color:var(--ember);color:var(--white);}
.btn.primary:hover{background:#a84810;border-color:#a84810;}
.btn.ghost{border-color:transparent;color:var(--smoke);}
.btn.ghost:hover{color:var(--ember);border-color:transparent;}

/* ── NAV ── */
.nav{
  background:var(--black);
  display:flex;
  align-items:center;
  padding:0 24px;
  border-bottom:1px solid #111;
  overflow-x:auto;
}
.nav-btn{
  background:transparent;
  border:none;
  font-family:var(--fn);
  font-size:11px;
  color:var(--smoke);
  padding:14px 18px;
  cursor:pointer;
  letter-spacing:0.08em;
  text-transform:uppercase;
  border-bottom:2px solid transparent;
  transition:all 0.15s;
  white-space:nowrap;
}
.nav-btn:hover{color:var(--mist);}
.nav-btn.active{color:var(--ember);border-bottom-color:var(--ember);}

/* ── MAIN ── */
.main{flex:1;padding:24px;}

/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px;}

.dash-card{background:var(--white);border:1px solid var(--fog);}
.dash-card-header{padding:14px 18px 10px;border-bottom:1px solid var(--fog);display:flex;align-items:center;justify-content:space-between;}
.dash-card-title{font-size:10px;color:var(--smoke);letter-spacing:0.1em;text-transform:uppercase;}
.dash-card-body{padding:18px;}

.big-number{font-family:var(--fs);font-size:52px;font-style:italic;font-weight:300;line-height:1;}
.big-label{font-size:10px;color:var(--smoke);letter-spacing:0.1em;text-transform:uppercase;margin-top:6px;}

.big-number.c-ember{color:var(--ember);}
.big-number.c-gold{color:var(--gold);}
.big-number.c-green{color:var(--green);}
.big-number.c-blue{color:var(--blue);}
.big-number.c-smoke{color:var(--smoke);}

/* Semáforo */
.semaforo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.sem-block{padding:16px 12px;text-align:center;border:1px solid;}
.sem-block.verde{background:var(--green-l);border-color:#70b08044;}
.sem-block.amarillo{background:var(--gold-l);border-color:#d4a04044;}
.sem-block.rojo{background:var(--red-l);border-color:#e08080 44;}
.sem-num{font-family:var(--fs);font-size:36px;font-style:italic;font-weight:300;line-height:1;}
.sem-block.verde .sem-num{color:var(--green);}
.sem-block.amarillo .sem-num{color:var(--gold);}
.sem-block.rojo .sem-num{color:var(--red);}
.sem-lbl{font-size:10px;margin-top:4px;letter-spacing:0.08em;text-transform:uppercase;}
.sem-block.verde .sem-lbl{color:#2a6a3a;}
.sem-block.amarillo .sem-lbl{color:#8a5800;}
.sem-block.rojo .sem-lbl{color:var(--red);}
.sem-sub{font-size:9px;margin-top:2px;color:inherit;opacity:0.7;}
.sem-selected{outline:2px solid;outline-offset:-2px;}
.sem-block.verde.sem-selected{outline-color:var(--green);}
.sem-block.amarillo.sem-selected{outline-color:var(--gold);}
.sem-block.rojo.sem-selected{outline-color:var(--red);}

/* Pedidos urgentes */
.urgentes-list{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;}
.urgente-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--red-l);border:1px solid #e0808044;}
.urgente-dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;}
.urgente-info{flex:1;min-width:0;}
.urgente-cliente{font-size:12px;font-weight:500;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.urgente-detail{font-size:10px;color:var(--ash);margin-top:2px;}
.urgente-dias{font-size:11px;color:var(--red);font-weight:500;white-space:nowrap;}

/* Estado resumen row */
.estados-row{display:flex;gap:0;border:1px solid var(--fog);}
.estado-block{flex:1;padding:20px 16px;text-align:center;border-right:1px solid var(--fog);}
.estado-block:last-child{border-right:none;}
.estado-n{font-family:var(--fs);font-size:32px;font-style:italic;font-weight:300;line-height:1;}
.estado-l{font-size:10px;color:var(--smoke);letter-spacing:0.1em;text-transform:uppercase;margin-top:4px;}

/* ── LOADING/EMPTY ── */
.state-box{text-align:center;padding:60px 24px;color:var(--smoke);}
.spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--fog);border-top-color:var(--ember);border-radius:50%;animation:spin 0.75s linear infinite;margin-bottom:14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.state-big{font-family:var(--fs);font-size:48px;font-style:italic;color:var(--mist);}
.state-msg{font-size:12px;margin-top:8px;line-height:1.6;}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--char);color:var(--fog);font-family:var(--fn);font-size:12px;padding:13px 20px;border-left:3px solid var(--ember);opacity:0;transform:translateY(8px);transition:all 0.25s;pointer-events:none;z-index:999;max-width:320px;line-height:1.5;}
#toast.show{opacity:1;transform:translateY(0);}
#toast.success{border-left-color:var(--green);}
#toast.warning{border-left-color:var(--gold);}

/* ── PLACEHOLDER MÓDULOS ── */
.module-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:var(--smoke);text-align:center;}
.module-placeholder .big{font-family:var(--fs);font-size:40px;font-style:italic;color:var(--mist);margin-bottom:12px;}
.module-placeholder p{font-size:12px;line-height:1.6;}

/* ── PROGRAMACIÓN ── */
.cal-grid{display:flex;gap:8px;overflow-x:auto;align-items:flex-start;padding-bottom:8px;}
.cal-grid.cal-mes{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-grid.cal-semana{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.cal-grid.cal-dia{display:grid;grid-template-columns:1fr;gap:8px;max-width:480px;}

.cal-col{background:var(--white);border:1px solid var(--fog);min-height:200px;min-width:0;}
.cal-col.cal-today{border-color:var(--ember);}
.cal-col.cal-weekend{background:#f8f8f0;}
.cal-col.cal-drop-active{border-color:var(--blue);background:var(--blue-l);}

.cal-col-header{padding:8px 10px 6px;border-bottom:1px solid var(--fog);display:flex;align-items:center;justify-content:space-between;}
.cal-day-label{font-size:11px;font-weight:500;color:var(--ash);letter-spacing:0.04em;}
.cal-col.cal-today .cal-day-label{color:var(--ember);}

.cal-cap-bar{height:4px;background:var(--fog);margin:0 10px 0;border-radius:2px;overflow:hidden;}
.cal-col .cal-cap-bar{margin:4px 10px;}

.cal-col-body{padding:8px;display:flex;flex-direction:column;gap:6px;min-height:120px;}

.cal-drop-hint{font-size:10px;color:var(--mist);text-align:center;padding:16px 8px;letter-spacing:0.06em;border:1px dashed var(--fog);margin:4px 0;}
.cal-drop-hint-mes{font-size:16px;color:var(--mist);text-align:center;line-height:1;}

.prog-card{background:var(--paper);border:1px solid var(--fog);padding:8px 10px;cursor:grab;transition:box-shadow 0.15s,opacity 0.15s;}
.prog-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.prog-card:active{cursor:grabbing;}
.prog-card.prog-done{background:var(--green-l);border-color:#70b08044;opacity:0.85;}
.prog-card.prog-queue{background:var(--white);margin-bottom:6px;}

.prog-done-btn{background:transparent;border:1px solid var(--green);color:var(--green);font-family:var(--fn);font-size:10px;padding:3px 10px;cursor:pointer;letter-spacing:0.06em;transition:all 0.15s;width:100%;}
.prog-done-btn:hover{background:var(--green);color:white;}

/* Mes */
.cal-mes-header{background:var(--char);color:var(--smoke);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:7px 8px;text-align:center;}
.cal-mes-cell{background:var(--white);border:1px solid var(--fog);padding:6px;min-height:90px;transition:background 0.1s;}
.cal-mes-cell.cal-today{border-color:var(--ember);}
.cal-mes-cell.cal-weekend{background:#f8f8f0;}
.cal-mes-cell.cal-othermonth{opacity:0.4;}
.cal-mes-cell.cal-drop-active{background:var(--blue-l);border-color:var(--blue);}
.cal-mes-day-num{font-size:12px;color:var(--ash);font-weight:500;}
.cal-mes-day-num.cal-today-num{color:var(--ember);}
.cal-mes-pill{font-size:10px;background:var(--fog);padding:2px 5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:grab;border-radius:2px;}
.cal-mes-pill:active{cursor:grabbing;}
.cal-mes-pill.cal-mes-pill-done{background:var(--green-l);color:var(--green);}

/* ── MÓDULO PLACEHOLDER ── */
.module-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:var(--smoke);text-align:center;}
.module-placeholder .big{font-family:var(--fs);font-size:40px;font-style:italic;color:var(--mist);margin-bottom:12px;}
.module-placeholder p{font-size:12px;line-height:1.6;}

@media(max-width:600px){
  .main{padding:14px;}
  .semaforo-grid{grid-template-columns:repeat(3,1fr);}
  .sem-num{font-size:28px;}
  .dash-grid{grid-template-columns:1fr;}
  .estados-row{flex-wrap:wrap;}
  .estado-block{flex:1 1 45%;border-bottom:1px solid var(--fog);}
  .header{padding:0 14px;}
  .nav{padding:0 8px;}
  .nav-btn{padding:12px 12px;font-size:10px;}
  .cal-grid.cal-semana{grid-template-columns:1fr;}
}
</style>
</head>

</div>

  const b64=pem.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
  const bin=atob(b64);const buf=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
  return crypto.subtle.importKey('pkcs8',buf.buffer,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
}
async function getToken(){
  if(accessToken&&Date.now()<tokenExpiry)return accessToken;
  const now=Math.floor(Date.now()/1000);
  const h=b64url(JSON.stringify({alg:'RS256',typ:'JWT'}));
  const c=b64url(JSON.stringify({iss:CREDS.client_email,scope:'https://www.googleapis.com/auth/spreadsheets',aud:CREDS.token_uri,exp:now+3600,iat:now}));
  const key=await pemToKey(CREDS.private_key);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,new TextEncoder().encode(h+'.'+c));
  const jwt=h+'.'+c+'.'+b64urlBuf(sig);
  const res=await fetch(CREDS.token_uri,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`});
  const data=await res.json();
  if(!data.access_token)throw new Error('Auth: '+JSON.stringify(data));
  accessToken=data.access_token;tokenExpiry=Date.now()+(data.expires_in-60)*1000;
  return accessToken;
}

// ─── UTILIDADES ───────────────────────────────────────────────────
function normalizeEstado(raw){
  const v=(raw||'').trim().toLowerCase();
  if(v==='entregado'||v==='entregada')return'Entregado';
  if(v==='terminado'||v==='terminada')return'Terminado';
  if(v==='programado'||v==='programada'||v==='en producción'||v==='en produccion')return'Programado';
  if(v==='pendiente')return'Pendiente';
  if(raw&&raw.trim())return raw.trim();
  return'Pendiente';
}

function parseDate(str){
  if(!str)return null;
  const s=str.trim();
  let y,m,d;
  if(/^\d{4}-\d{2}-\d{2}/.test(s)){
    // YYYY-MM-DD → construir con hora local para evitar desfase UTC
    [y,m,d]=s.split('-').map(Number);
  } else if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(s)){
    const parts=s.split('/');
    d=Number(parts[0]);m=Number(parts[1]);y=Number(parts[2]);
  } else { return null; }
  const dt=new Date(y,m-1,d,0,0,0,0);
  return isNaN(dt.getTime())?null:dt;
}

function diasHabilesDesde(fechaStr){
  const fecha=parseDate(fechaStr);
  if(!fecha)return null;
  const hoy=new Date();
  const hoyLocal=new Date(hoy.getFullYear(),hoy.getMonth(),hoy.getDate(),0,0,0,0);
  fecha.setHours(0,0,0,0);
  if(fecha>hoyLocal)return 0;
  let dias=0,cur=new Date(fecha);
  while(cur<hoyLocal){
    cur.setDate(cur.getDate()+1);
    const dow=cur.getDay();
    if(dow!==0&&dow!==6)dias++;
  }
  return dias;
}

function semColor(dias){
  if(dias===null)return'smoke';
  if(dias<=6)return'verde';
  if(dias<=10)return'amarillo';
  return'rojo';
}

function esc(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function todayISO(){
  return isoDate(new Date());
}

function formatDateCL(str){
  const d=parseDate(str);
  if(!d)return'—';
  return d.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric'});
}

// ─── PROGRAMACIÓN ────────────────────────────────────────────────
// Capacidad diaria por producto (provisional)
const CAPACIDAD = {
  hanoi: 10,
  default: 3
};

let progVista = 'semana';
let progFecha = (()=>{ const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),d.getDate(),0,0,0,0); })();

function getCapacidadProducto(r){
  const sub = (r[C.SUBPRODUCTO]||'').toLowerCase();
  const cat = (r[C.CATEGORIA]||'').toLowerCase();
  if(sub.includes('hanoi')||cat.includes('hanoi')) return CAPACIDAD.hanoi;
  return CAPACIDAD.default;
}

function isoDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function addDays(d, n){
  const r = new Date(d);
  r.setDate(r.getDate()+n);
  return r;
}

function startOfWeek(d){
  const r = new Date(d);
  const day = r.getDay(); // 0=Dom
  const diff = day === 0 ? -6 : 1 - day; // lunes
  r.setDate(r.getDate()+diff);
  r.setHours(0,0,0,0);
  return r;
}

function startOfMonth(d){
  return new Date(d.getFullYear(), d.getMonth(), 1);
}

function formatDayHeader(d){
  const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`;
}

function formatMonthYear(d){
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return `${meses[d.getMonth()]} ${d.getFullYear()}`;
}

// Normalizar cualquier fecha a formato YYYY-MM-DD para comparar
function normalizeDateStr(str){
  if(!str||!str.trim()) return '';
  const d = parseDate(str.trim());
  if(!d) return str.trim();
  return isoDate(d);
}

// Calcular carga total de capacidad para una fecha
function getCargaDia(dateStr, rows){
  const programados = rows.filter(r =>
    normalizeDateStr(r[C.FECHA_PROD]) === dateStr &&
    ['Pendiente','Programado'].includes(normalizeEstado(r[C.ESTADO]))
  );
  const total = programados.reduce((acc, r) => acc + (parseInt(r[C.CANTIDAD])||1), 0);
  const maxCap = 10;
  return { total, maxCap, pct: Math.min(100, Math.round(total/maxCap*100)) };
}

function getDatesForVista(){
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  if(progVista==='dia'){
    return [isoDate(progFecha)];
  } else if(progVista==='semana'){
    const lunes = startOfWeek(progFecha);
    return Array.from({length:7},(_,i)=>isoDate(addDays(lunes,i)));
  } else {
    // mes: semanas completas que cubran el mes
    const inicio = startOfMonth(progFecha);
    const lunes = startOfWeek(inicio);
    const fin = new Date(progFecha.getFullYear(), progFecha.getMonth()+1, 0);
    const dates = [];
    let cur = new Date(lunes);
    while(cur <= fin || dates.length%7!==0){
      dates.push(isoDate(cur));
      cur = addDays(cur,1);
      if(dates.length>42) break;
    }
    return dates;
  }
}

function renderProgramacion(){
  const data = allRows.slice(1);
  const hoy  = isoDate(new Date());
  const dates = getDatesForVista();

  // Título navegación
  let navTitle = '';
  if(progVista==='dia') navTitle = formatDayHeader(progFecha);
  else if(progVista==='semana'){
    const lunes = startOfWeek(progFecha);
    const dom   = addDays(lunes,6);
    navTitle = `${lunes.getDate()} – ${dom.getDate()} ${formatMonthYear(dom)}`;
  } else navTitle = formatMonthYear(progFecha);

  const colsHTML = progVista==='mes'
    ? renderCalMes(dates, data, hoy)
    : dates.map(d=>renderDiaCol(d, data, d===hoy)).join('');

  document.getElementById('mainContent').innerHTML=`
    <div style="display:flex;gap:16px;align-items:flex-start;">

      <!-- Cola sin programar -->
      <div style="width:220px;flex-shrink:0;">
        <div class="dash-card">
          <div class="dash-card-header">
            <span class="dash-card-title">Cola sin programar</span>
          </div>
          <div style="padding:10px;max-height:calc(100vh - 180px);overflow-y:auto;" id="colaContainer">
            ${renderColaSinProgramar(data)}
          </div>
        </div>
      </div>

      <!-- Calendario -->
      <div style="flex:1;min-width:0;">
        <!-- Toolbar calendario -->
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
          <div style="display:flex;gap:4px;">
            <button class="btn${progVista==='dia'?' primary':''}" onclick="setProgVista('dia')">Día</button>
            <button class="btn${progVista==='semana'?' primary':''}" onclick="setProgVista('semana')">Semana</button>
            <button class="btn${progVista==='mes'?' primary':''}" onclick="setProgVista('mes')">Mes</button>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <button class="btn" onclick="navProg(-1)">←</button>
            <span style="font-size:13px;font-weight:500;min-width:180px;text-align:center;">${navTitle}</span>
            <button class="btn" onclick="navProg(1)">→</button>
          </div>
          <button class="btn ghost" onclick="const d=new Date();progFecha=new Date(d.getFullYear(),d.getMonth(),d.getDate(),0,0,0,0);renderProgramacion()">Hoy</button>
          <div style="margin-left:auto;font-size:10px;color:var(--smoke);display:flex;align-items:center;gap:10px;">
            <span style="display:flex;align-items:center;gap:4px;"><span style="display:inline-block;width:10px;height:10px;background:var(--green);border-radius:2px;"></span>OK</span>
            <span style="display:flex;align-items:center;gap:4px;"><span style="display:inline-block;width:10px;height:10px;background:var(--gold);border-radius:2px;"></span>70%+</span>
            <span style="display:flex;align-items:center;gap:4px;"><span style="display:inline-block;width:10px;height:10px;background:var(--red);border-radius:2px;"></span>Lleno</span>
          </div>
        </div>

        <!-- Grilla calendario -->
        <div class="cal-grid cal-${progVista}" id="calGrid">
          ${colsHTML}
        </div>
      </div>

    </div>
  `;
}

function renderCalMes(dates, data, hoy){
  // Encabezados de días
  const headers = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d=>
    `<div class="cal-mes-header">${d}</div>`).join('');

  const cols = dates.map(d=>{
    const date = parseDate(d);
    const dow  = date ? date.getDay() : 0;
    const isWeekend = dow===0||dow===6;
    const pedidosDia = data
      .filter(r => normalizeDateStr(r[C.FECHA_PROD])===d && ['Pendiente','Programado','Terminado'].includes(normalizeEstado(r[C.ESTADO])));
    const carga = getCargaDia(d, data);
    const barColor = carga.pct>=100?'var(--red)':carga.pct>=70?'var(--gold)':'var(--green)';
    const isCurrentMonth = date && date.getMonth()===progFecha.getMonth();
    return `<div class="cal-mes-cell${d===hoy?' cal-today':''}${isWeekend?' cal-weekend':''}${!isCurrentMonth?' cal-othermonth':''}"
      data-date="${d}"
      ondragover="onDayDragOver(event)"
      ondragleave="onDayDragLeave(event)"
      ondrop="onDayDrop(event,'${d}')">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;">
        <span class="cal-mes-day-num${d===hoy?' cal-today-num':''}">${date?date.getDate():''}</span>
        ${carga.total>0?`<span style="font-size:9px;color:var(--smoke)">${carga.total}u</span>`:''}
      </div>
      ${carga.total>0?`<div class="cal-cap-bar" style="margin-bottom:4px;"><div style="width:${carga.pct}%;background:${barColor};height:100%;"></div></div>`:''}
      <div style="display:flex;flex-direction:column;gap:2px;min-height:24px;" id="day-${d}">
        ${pedidosDia.slice(0,3).map(r=>{
          const idx = allRows.indexOf(r);
          const producido = r[C.FECHA_PROD_REAL]&&r[C.FECHA_PROD_REAL].trim();
          const dias = diasHabilesDesde(r[C.FECHA_INGRESO]);
          const sem  = semColor(dias);
          const semColors={verde:'var(--green)',amarillo:'var(--gold)',rojo:'var(--red)'};
          return `<div class="cal-mes-pill${producido?' cal-mes-pill-done':''}"
            draggable="true"
            data-idx="${idx}"
            ondragstart="onCardDragStart(event,${idx})"
            ondragend="onCardDragEnd(event)"
            style="border-left:2px solid ${semColors[sem]||'var(--smoke)'};"
            title="${esc(r[C.CLIENTE]||'')} · ${esc(r[C.SUBPRODUCTO]||r[C.CATEGORIA]||'')}">
            ${esc((r[C.CLIENTE]||'').split(' ')[0])}${producido?' ✓':''}
          </div>`;
        }).join('')}
        ${pedidosDia.length>3?`<div style="font-size:9px;color:var(--smoke);padding:1px 3px;">+${pedidosDia.length-3} más</div>`:''}
        ${pedidosDia.length===0?'<div class="cal-drop-hint-mes">+</div>':''}
      </div>
    </div>`;
  });

  return headers + cols.join('');
}

function setProgVista(v){
  progVista = v;
  renderProgramacion();
}

function navProg(dir){
  if(progVista==='dia'){
    progFecha = addDays(progFecha, dir);
  } else if(progVista==='semana'){
    progFecha = addDays(progFecha, dir*7);
  } else {
    progFecha = new Date(progFecha.getFullYear(), progFecha.getMonth()+dir, 1);
  }
  renderProgramacion();
}

// ── DRAG & DROP ──────────────────────────────────────────────────
function onCardDragStart(e, rowIdx){
  dragData = { rowIdx };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', String(rowIdx));
  setTimeout(()=>{ if(e.target) e.target.style.opacity='0.4'; }, 0);
}

function onCardDragEnd(e){
  if(e.target) e.target.style.opacity='';
  dragData = null;
  document.querySelectorAll('.cal-drop-active').forEach(el=>el.classList.remove('cal-drop-active'));
}

function onDayDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const col = e.currentTarget;
  col.classList.add('cal-drop-active');
}

function onDayDragLeave(e){
  if(!e.currentTarget.contains(e.relatedTarget)){
    e.currentTarget.classList.remove('cal-drop-active');
  }
}

async function onDayDrop(e, dateStr){
  e.preventDefault();
  e.stopPropagation();
  // Obtener fecha del elemento con data-date más cercano (por si el drop cae en hijo)
  let target = e.target;
  while(target && !target.dataset.date) target = target.parentElement;
  const finalDate = (target && target.dataset.date) ? target.dataset.date : dateStr;

  document.querySelectorAll('.cal-drop-active').forEach(el=>el.classList.remove('cal-drop-active'));

  const rowIdx = parseInt(e.dataTransfer.getData('text/plain'));
  if(isNaN(rowIdx)||!allRows[rowIdx]) return;

  const oldDate = allRows[rowIdx][C.FECHA_PROD]||'';
  if(normalizeDateStr(oldDate)===finalDate) return;

  while(allRows[rowIdx].length < 14) allRows[rowIdx].push('');
  const estadoAnterior = normalizeEstado(allRows[rowIdx][C.ESTADO]);
  allRows[rowIdx][C.FECHA_PROD] = finalDate;
  if(estadoAnterior === 'Pendiente'){
    allRows[rowIdx][C.ESTADO] = 'Programado';
  }

  renderProgramacion();
  showToast('Guardando en Sheets...','warning');

  try{
    const sheetRow = rowIdx+1;
    await writeRange(`${SHEET_NAME}!G${sheetRow}`, [[finalDate]]);
    if(estadoAnterior === 'Pendiente'){
      await writeRange(`${SHEET_NAME}!F${sheetRow}`, [['Programado']]);
    }
    showToast('✓ Pedido reprogramado','success');
  }catch(err){
    allRows[rowIdx][C.FECHA_PROD] = oldDate;
    if(estadoAnterior === 'Pendiente') allRows[rowIdx][C.ESTADO] = 'Pendiente';
    renderProgramacion();
    showToast('Error al guardar: '+err.message);
  }
}

// ── MARCAR PRODUCIDO ─────────────────────────────────────────────
async function marcarProducido(e, rowIdx){
  e.stopPropagation();
  if(!allRows[rowIdx]) return;

  const hoy = todayISO();
  const clienteNombre = allRows[rowIdx][C.CLIENTE]||'Pedido';

  // Actualizar local
  while(allRows[rowIdx].length<14) allRows[rowIdx].push('');
  allRows[rowIdx][C.ESTADO]         = 'Terminado';
  allRows[rowIdx][C.FECHA_PROD_REAL]= hoy;

  renderProgramacion();
  showToast('Guardando...','warning');

  try{
    const sheetRow = rowIdx+1;
    await writeRange(`${SHEET_NAME}!F${sheetRow}`, [['Terminado']]);
    await writeRange(`${SHEET_NAME}!M${sheetRow}`, [[hoy]]);
    showToast(`✓ ${esc(clienteNombre)} marcado como producido`,'success');
  }catch(err){
    allRows[rowIdx][C.ESTADO]          = 'Programado';
    allRows[rowIdx][C.FECHA_PROD_REAL] = '';
    renderProgramacion();
    showToast('Error: '+err.message);
  }
}

// ─── TOAST ────────────────────────────────────────────────────────
let toastT=null;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show'+(type?' '+type:'');
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(()=>{t.className='';},3500);
}
