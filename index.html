<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BosqueNegro — Sistema de Gestión</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --black: #1a1a18;
  --char: #2c2c28;
  --ash: #4a4a44;
  --smoke: #8a8a82;
  --mist: #c8c8be;
  --fog: #e8e8e0;
  --white: #f5f5ee;
  --paper: #fafaf5;
  --ember: #c85a20;
  --ember-l: #f8ede6;
  --gold: #c4880a;
  --gold-l: #fdf3dc;
  --green: #3a7a4a;
  --green-l: #e4f0e8;
  --blue: #2a5a8a;
  --blue-l: #e4eef8;
  --red: #b03020;
  --red-l: #fcecea;
  --fn: 'DM Mono', monospace;
  --fs: 'Fraunces', serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--black);font-family:var(--fn);font-size:13px;min-height:100vh;}

/* ── LOGIN ── */
#loginScreen {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:var(--char);
  padding:24px;
}
.login-logo {
  font-family:var(--fs);
  font-size:36px;
  font-style:italic;
  font-weight:300;
  color:var(--white);
  letter-spacing:0.01em;
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:12px;
}
.login-logo-dot{width:12px;height:12px;background:var(--ember);border-radius:50%;}
.login-sub{font-size:11px;color:var(--smoke);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:48px;}
.login-title{font-size:12px;color:var(--mist);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:20px;}
.role-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;width:100%;max-width:560px;}
.role-card {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  padding:24px 20px;
  cursor:pointer;
  transition:all 0.2s;
  text-align:center;
}
.role-card:hover{background:rgba(255,255,255,0.08);border-color:var(--ember);transform:translateY(-2px);}
.role-icon{font-size:28px;margin-bottom:12px;}
.role-name{font-size:13px;color:var(--white);font-weight:500;letter-spacing:0.05em;}
.role-desc{font-size:10px;color:var(--smoke);margin-top:6px;line-height:1.5;letter-spacing:0.04em;}

/* ── APP SHELL ── */
#appShell{display:none;flex-direction:column;min-height:100vh;}

/* ── HEADER ── */
.header{
  background:var(--char);
  height:52px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid #111;
}
.logo{font-family:var(--fs);font-size:18px;font-style:italic;font-weight:300;color:var(--white);display:flex;align-items:center;gap:10px;}
.logo-dot{width:8px;height:8px;background:var(--ember);border-radius:50%;flex-shrink:0;}
.header-right{display:flex;align-items:center;gap:14px;}
.sync-info{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--smoke);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.sync-dot.syncing{background:var(--gold);animation:blink 0.8s infinite;}
.sync-dot.error{background:var(--ember);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.role-badge{font-size:10px;color:var(--smoke);letter-spacing:0.08em;text-transform:uppercase;border:1px solid var(--ash);padding:3px 10px;}
.btn{background:transparent;border:1px solid var(--ash);color:var(--mist);font-family:var(--fn);font-size:11px;padding:6px 14px;cursor:pointer;letter-spacing:0.07em;transition:all 0.15s;}
.btn:hover{border-color:var(--ember);color:var(--ember);}
.btn:disabled{opacity:0.4;pointer-events:none;}
.btn.primary{background:var(--ember);border-color:var(--ember);color:var(--white);}
.btn.primary:hover{background:#a84810;border-color:#a84810;}
.btn.ghost{border-color:transparent;color:var(--smoke);}
.btn.ghost:hover{color:var(--ember);border-color:transparent;}

/* ── NAV ── */
.nav{
  background:var(--black);
  display:flex;
  align-items:center;
  padding:0 24px;
  border-bottom:1px solid #111;
  overflow-x:auto;
}
.nav-btn{
  background:transparent;
  border:none;
  font-family:var(--fn);
  font-size:11px;
  color:var(--smoke);
  padding:14px 18px;
  cursor:pointer;
  letter-spacing:0.08em;
  text-transform:uppercase;
  border-bottom:2px solid transparent;
  transition:all 0.15s;
  white-space:nowrap;
}
.nav-btn:hover{color:var(--mist);}
.nav-btn.active{color:var(--ember);border-bottom-color:var(--ember);}

/* ── MAIN ── */
.main{flex:1;padding:24px;}

/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px;}

.dash-card{background:var(--white);border:1px solid var(--fog);}
.dash-card-header{padding:14px 18px 10px;border-bottom:1px solid var(--fog);display:flex;align-items:center;justify-content:space-between;}
.dash-card-title{font-size:10px;color:var(--smoke);letter-spacing:0.1em;text-transform:uppercase;}
.dash-card-body{padding:18px;}

.big-number{font-family:var(--fs);font-size:52px;font-style:italic;font-weight:300;line-height:1;}
.big-label{font-size:10px;color:var(--smoke);letter-spacing:0.1em;text-transform:uppercase;margin-top:6px;}

.big-number.c-ember{color:var(--ember);}
.big-number.c-gold{color:var(--gold);}
.big-number.c-green{color:var(--green);}
.big-number.c-blue{color:var(--blue);}
.big-number.c-smoke{color:var(--smoke);}

/* Semáforo */
.semaforo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.sem-block{padding:16px 12px;text-align:center;border:1px solid;}
.sem-block.verde{background:var(--green-l);border-color:#70b08044;}
.sem-block.amarillo{background:var(--gold-l);border-color:#d4a04044;}
.sem-block.rojo{background:var(--red-l);border-color:#e08080 44;}
.sem-num{font-family:var(--fs);font-size:36px;font-style:italic;font-weight:300;line-height:1;}
.sem-block.verde .sem-num{color:var(--green);}
.sem-block.amarillo .sem-num{color:var(--gold);}
.sem-block.rojo .sem-num{color:var(--red);}
.sem-lbl{font-size:10px;margin-top:4px;letter-spacing:0.08em;text-transform:uppercase;}
.sem-block.verde .sem-lbl{color:#2a6a3a;}
.sem-block.amarillo .sem-lbl{color:#8a5800;}
.sem-block.rojo .sem-lbl{color:var(--red);}
.sem-sub{font-size:9px;margin-top:2px;color:inherit;opacity:0.7;}

/* Pedidos urgentes */
.urgentes-list{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;}
.urgente-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--red-l);border:1px solid #e0808044;}
.urgente-dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;}
.urgente-info{flex:1;min-width:0;}
.urgente-cliente{font-size:12px;font-weight:500;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.urgente-detail{font-size:10px;color:var(--ash);margin-top:2px;}
.urgente-dias{font-size:11px;color:var(--red);font-weight:500;white-space:nowrap;}

/* Estado resumen row */
.estados-row{display:flex;gap:0;border:1px solid var(--fog);}
.estado-block{flex:1;padding:20px 16px;text-align:center;border-right:1px solid var(--fog);}
.estado-block:last-child{border-right:none;}
.estado-n{font-family:var(--fs);font-size:32px;font-style:italic;font-weight:300;line-height:1;}
.estado-l{font-size:10px;color:var(--smoke);letter-spacing:0.1em;text-transform:uppercase;margin-top:4px;}

/* ── LOADING/EMPTY ── */
.state-box{text-align:center;padding:60px 24px;color:var(--smoke);}
.spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--fog);border-top-color:var(--ember);border-radius:50%;animation:spin 0.75s linear infinite;margin-bottom:14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.state-big{font-family:var(--fs);font-size:48px;font-style:italic;color:var(--mist);}
.state-msg{font-size:12px;margin-top:8px;line-height:1.6;}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--char);color:var(--fog);font-family:var(--fn);font-size:12px;padding:13px 20px;border-left:3px solid var(--ember);opacity:0;transform:translateY(8px);transition:all 0.25s;pointer-events:none;z-index:999;max-width:320px;line-height:1.5;}
#toast.show{opacity:1;transform:translateY(0);}
#toast.success{border-left-color:var(--green);}
#toast.warning{border-left-color:var(--gold);}

/* ── PLACEHOLDER MÓDULOS ── */
.module-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:var(--smoke);text-align:center;}
.module-placeholder .big{font-family:var(--fs);font-size:40px;font-style:italic;color:var(--mist);margin-bottom:12px;}
.module-placeholder p{font-size:12px;line-height:1.6;}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .main{padding:14px;}
  .semaforo-grid{grid-template-columns:repeat(3,1fr);}
  .sem-num{font-size:28px;}
  .dash-grid{grid-template-columns:1fr;}
  .estados-row{flex-wrap:wrap;}
  .estado-block{flex:1 1 45%;border-bottom:1px solid var(--fog);}
  .header{padding:0 14px;}
  .nav{padding:0 8px;}
  .nav-btn{padding:12px 12px;font-size:10px;}
}
</style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-logo">
    <div class="login-logo-dot"></div>
    BosqueNegro
  </div>
  <div class="login-sub">Sistema de Gestión</div>
  <div class="login-title">Selecciona tu perfil</div>
  <div class="role-grid">
    <div class="role-card" onclick="login('admin')">
      <div class="role-icon">◈</div>
      <div class="role-name">Administrador</div>
      <div class="role-desc">Acceso completo a todos los módulos</div>
    </div>
    <div class="role-card" onclick="login('produccion')">
      <div class="role-icon">◎</div>
      <div class="role-name">Producción</div>
      <div class="role-desc">Programación y registro de producción</div>
    </div>
    <div class="role-card" onclick="login('despacho')">
      <div class="role-icon">◇</div>
      <div class="role-name">Despacho</div>
      <div class="role-desc">Gestión de entregas y despachos</div>
    </div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════════════ -->
<div id="appShell">

  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      BosqueNegro
      <span style="font-family:var(--fn);font-size:11px;font-style:normal;color:var(--smoke);margin-left:4px;" id="headerModulo"></span>
    </div>
    <div class="header-right">
      <div class="sync-info">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncLabel">—</span>
      </div>
      <span class="role-badge" id="roleBadge"></span>
      <button class="btn" onclick="syncNow()">↻</button>
      <button class="btn ghost" onclick="logout()" style="font-size:10px;">Salir</button>
    </div>
  </div>

  <nav class="nav" id="mainNav"></nav>

  <div class="main" id="mainContent">
    <div class="state-box"><div class="spinner"></div></div>
  </div>

</div>

<div id="toast"></div>

<script>

const C = {
  OT:0, FECHA_INGRESO:1, CONTADOR:2, SEMAFORO:3,
  CLIENTE:4, ESTADO:5, FECHA_PROD:6,
  CATEGORIA:7, SUBPRODUCTO:8, TERMINACION:9,
  CANTIDAD:10, DETALLE:11,
  FECHA_PROD_REAL:12, FECHA_DESPACHO_REAL:13
};

// Roles y módulos disponibles
const ROLES = {
  admin:      { label: 'Administrador', modulos: ['dashboard','programacion','despacho','reporteria'] },
  produccion: { label: 'Producción',    modulos: ['programacion'] },
  despacho:   { label: 'Despacho',      modulos: ['despacho'] }
};

const MODULO_LABELS = {
  dashboard:    'Dashboard',
  programacion: 'Programación',
  despacho:     'Despacho',
  reporteria:   'Reportería'
};

// ─── ESTADO GLOBAL ────────────────────────────────────────────────
let currentRole   = null;
let currentModulo = null;
let allRows       = [];
let accessToken   = null;
let tokenExpiry   = 0;
let autoSyncTimer = null;

// ─── AUTH ─────────────────────────────────────────────────────────
function b64url(str){return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
function b64urlBuf(buf){let b='';const a=new Uint8Array(buf);for(let i=0;i<a.length;i++)b+=String.fromCharCode(a[i]);return btoa(b).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function pemToKey(pem){
  const b64=pem.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
  const bin=atob(b64);const buf=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
  return crypto.subtle.importKey('pkcs8',buf.buffer,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
}
async function getToken(){
  if(accessToken&&Date.now()<tokenExpiry)return accessToken;
  const now=Math.floor(Date.now()/1000);
  const h=b64url(JSON.stringify({alg:'RS256',typ:'JWT'}));
  const c=b64url(JSON.stringify({iss:CREDS.client_email,scope:'https://www.googleapis.com/auth/spreadsheets',aud:CREDS.token_uri,exp:now+3600,iat:now}));
  const key=await pemToKey(CREDS.private_key);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,new TextEncoder().encode(h+'.'+c));
  const jwt=h+'.'+c+'.'+b64urlBuf(sig);
  const res=await fetch(CREDS.token_uri,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`});
  const data=await res.json();
  if(!data.access_token)throw new Error('Auth: '+JSON.stringify(data));
  accessToken=data.access_token;tokenExpiry=Date.now()+(data.expires_in-60)*1000;
  return accessToken;
}

// ─── SHEETS ───────────────────────────────────────────────────────
async function readSheet(){
  const token=await getToken();
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}`;
  const res=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.values||[];
}

async function writeRange(range,values){
  const token=await getToken();
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`;
  const res=await fetch(url,{method:'PUT',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({range,majorDimension:'ROWS',values})});
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data;
}

// ─── SYNC ─────────────────────────────────────────────────────────
function setSyncStatus(status,msg){
  const dot=document.getElementById('syncDot');
  const lbl=document.getElementById('syncLabel');
  if(!dot)return;
  dot.className='sync-dot'+(status?' '+status:'');
  lbl.textContent=msg;
}

async function syncNow(){
  setSyncStatus('syncing','Sincronizando...');
  try{
    const values=await readSheet();
    allRows=values;
    renderCurrentModulo();
    const t=new Date();
    setSyncStatus('',`${t.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})}`);
    document.getElementById('syncDot').style.background='var(--green)';
  }catch(e){
    setSyncStatus('error','Error');
    showToast('Error de sincronización: '+e.message);
  }
}

function startAutoSync(){
  if(autoSyncTimer)clearInterval(autoSyncTimer);
  autoSyncTimer=setInterval(syncNow,60000);
}

// ─── LOGIN ────────────────────────────────────────────────────────
function login(role){
  currentRole=role;
  const rolData=ROLES[role];
  document.getElementById('loginScreen').style.display='none';
  const app=document.getElementById('appShell');
  app.style.display='flex';
  document.getElementById('roleBadge').textContent=rolData.label;
  buildNav(rolData.modulos);
  const firstModulo=rolData.modulos[0];
  setModulo(firstModulo);
  syncNow().then(startAutoSync);
}

function logout(){
  currentRole=null;currentModulo=null;allRows=[];
  if(autoSyncTimer)clearInterval(autoSyncTimer);
  document.getElementById('appShell').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}

// ─── NAV ──────────────────────────────────────────────────────────
function buildNav(modulos){
  const nav=document.getElementById('mainNav');
  nav.innerHTML=modulos.map(m=>`
    <button class="nav-btn" id="nav-${m}" onclick="setModulo('${m}')">${MODULO_LABELS[m]}</button>
  `).join('');
}

function setModulo(m){
  currentModulo=m;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+m);
  if(nb)nb.classList.add('active');
  document.getElementById('headerModulo').textContent='— '+MODULO_LABELS[m];
  renderCurrentModulo();
}

function renderCurrentModulo(){
  switch(currentModulo){
    case 'dashboard':    renderDashboard();    break;
    case 'programacion': renderProgramacion(); break;
    case 'despacho':     renderDespacho();     break;
    case 'reporteria':   renderReporteria();   break;
  }
}

// ─── UTILIDADES ───────────────────────────────────────────────────
function normalizeEstado(raw){
  const v=(raw||'').trim().toLowerCase();
  if(v==='entregado'||v==='entregada')return'Entregado';
  if(v==='terminado'||v==='terminada')return'Terminado';
  if(v==='programado'||v==='programada'||v==='en producción'||v==='en produccion')return'Programado';
  if(v==='pendiente')return'Pendiente';
  if(raw&&raw.trim())return raw.trim();
  return'Pendiente';
}

function parseDate(str){
  if(!str)return null;
  // Soporta dd/mm/yyyy, yyyy-mm-dd, d/m/yyyy
  const s=str.trim();
  let d;
  if(/^\d{4}-\d{2}-\d{2}/.test(s)){d=new Date(s);}
  else if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(s)){
    const[dd,mm,yyyy]=s.split('/');
    d=new Date(`${yyyy}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`);
  } else { d=new Date(s); }
  return isNaN(d.getTime())?null:d;
}

function diasHabilesDesde(fechaStr){
  const fecha=parseDate(fechaStr);
  if(!fecha)return null;
  const hoy=new Date();
  hoy.setHours(0,0,0,0);
  fecha.setHours(0,0,0,0);
  if(fecha>hoy)return 0;
  let dias=0,cur=new Date(fecha);
  while(cur<hoy){
    cur.setDate(cur.getDate()+1);
    const dow=cur.getDay();
    if(dow!==0&&dow!==6)dias++;
  }
  return dias;
}

function semColor(dias){
  if(dias===null)return'smoke';
  if(dias<=6)return'verde';
  if(dias<=10)return'amarillo';
  return'rojo';
}

function esc(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function todayISO(){return new Date().toISOString().split('T')[0];}

function formatDateCL(str){
  const d=parseDate(str);
  if(!d)return'—';
  return d.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric'});
}

// ─── DASHBOARD ────────────────────────────────────────────────────
function renderDashboard(){
  if(allRows.length===0){
    document.getElementById('mainContent').innerHTML=
      '<div class="state-box"><div class="spinner"></div><div class="state-msg">Cargando datos...</div></div>';
    return;
  }

  const data=allRows.slice(1);
  const pendientes=data.filter(r=>['Pendiente','Programado'].includes(normalizeEstado(r[C.ESTADO])));
  const terminados=data.filter(r=>normalizeEstado(r[C.ESTADO])==='Terminado');
  const entregados=data.filter(r=>normalizeEstado(r[C.ESTADO])==='Entregado');
  const soloPendientes=data.filter(r=>normalizeEstado(r[C.ESTADO])==='Pendiente');
  const soloProgramados=data.filter(r=>normalizeEstado(r[C.ESTADO])==='Programado');

  // Semáforo sobre pendientes + programados activos
  let verde=0,amarillo=0,rojo=0;
  const urgentes=[];
  pendientes.forEach(r=>{
    const dias=diasHabilesDesde(r[C.FECHA_INGRESO]);
    const color=semColor(dias);
    if(color==='verde')verde++;
    else if(color==='amarillo')amarillo++;
    else{rojo++;urgentes.push({r,dias});}
  });
  urgentes.sort((a,b)=>(b.dias||0)-(a.dias||0));

  const urgHTML=urgentes.length===0
    ? '<div style="font-size:12px;color:var(--smoke);text-align:center;padding:20px;">Sin pedidos críticos ✓</div>'
    : urgentes.slice(0,8).map(({r,dias})=>`
        <div class="urgente-item">
          <div class="urgente-dot"></div>
          <div class="urgente-info">
            <div class="urgente-cliente">${esc(r[C.CLIENTE])||'Sin nombre'}</div>
            <div class="urgente-detail">${esc(r[C.SUBPRODUCTO])||esc(r[C.CATEGORIA])||'—'} · OT ${esc(r[C.OT])||'—'}</div>
          </div>
          <div class="urgente-dias">${dias} días</div>
        </div>`).join('');

  document.getElementById('mainContent').innerHTML=`
    <div class="estados-row" style="margin-bottom:20px;">
      <div class="estado-block">
        <div class="estado-n c-ember" style="color:var(--ember)">${soloPendientes.length}</div>
        <div class="estado-l">Pendiente</div>
      </div>
      <div class="estado-block">
        <div class="estado-n" style="color:var(--gold)">${soloProgramados.length}</div>
        <div class="estado-l">Programado</div>
      </div>
      <div class="estado-block">
        <div class="estado-n" style="color:var(--green)">${terminados.length}</div>
        <div class="estado-l">Terminado</div>
      </div>
      <div class="estado-block">
        <div class="estado-n" style="color:var(--smoke)">${entregados.length}</div>
        <div class="estado-l">Entregado</div>
      </div>
    </div>

    <div class="dash-grid">
      <div class="dash-card">
        <div class="dash-card-header">
          <span class="dash-card-title">Nivel de servicio — Pedidos activos</span>
          <span style="font-size:10px;color:var(--smoke)">${pendientes.length} pedidos</span>
        </div>
        <div class="dash-card-body">
          <div class="semaforo-grid">
            <div class="sem-block verde">
              <div class="sem-num">${verde}</div>
              <div class="sem-lbl">Verde</div>
              <div class="sem-sub">0–6 días</div>
            </div>
            <div class="sem-block amarillo">
              <div class="sem-num">${amarillo}</div>
              <div class="sem-lbl">Amarillo</div>
              <div class="sem-sub">7–10 días</div>
            </div>
            <div class="sem-block rojo">
              <div class="sem-num">${rojo}</div>
              <div class="sem-lbl">Rojo</div>
              <div class="sem-sub">11+ días</div>
            </div>
          </div>
        </div>
      </div>

      <div class="dash-card">
        <div class="dash-card-header">
          <span class="dash-card-title">Pedidos críticos (11+ días)</span>
          <span style="font-size:10px;color:var(--red)">${rojo} urgentes</span>
        </div>
        <div class="dash-card-body">
          <div class="urgentes-list">${urgHTML}</div>
        </div>
      </div>
    </div>

    <div style="margin-top:16px;font-size:10px;color:var(--smoke);text-align:right;letter-spacing:0.06em;">
      Días hábiles calculados desde fecha de ingreso · Nivel de servicio: 7–10 días hábiles
    </div>
  `;
}

// ─── TOAST ────────────────────────────────────────────────────────
let toastT=null;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show'+(type?' '+type:'');
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(()=>{t.className='';},3500);
}
