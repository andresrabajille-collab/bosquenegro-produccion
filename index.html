<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BosqueNegro — Sistema de Gestión</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --black: #222220;
  --char: #1a1a18;
  --ash: #3a3a38;
  --smoke: #7a7a72;
  --mist: #b8b8a8;
  --fog: #e4ddd0;
  --white: #F0E6D5;
  --paper: #f7f2ea;
  --ember: #DA4040;
  --ember-l: #f9e8e8;
  --gold: #b07830;
  --gold-l: #f5ead8;
  --green: #3a6a3a;
  --green-l: #e0ece0;
  --blue: #2a4a7a;
  --blue-l: #e0e8f5;
  --red: #DA4040;
  --red-l: #f9e8e8;
  --cream: #F0E6D5;
  --fn: 'Jost', sans-serif;
  --fs: 'Cormorant Garamond', serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--black);font-family:var(--fn);font-size:13px;min-height:100vh;letter-spacing:0.02em;}

/* ── LOGIN ── */
#loginScreen {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:var(--char);
  padding:24px;
}
.login-logo {
  font-family:var(--fs);
  font-size:42px;
  font-weight:300;
  color:var(--cream);
  letter-spacing:0.2em;
  text-transform:uppercase;
  margin-bottom:4px;
  display:flex;
  align-items:center;
  gap:14px;
}
.login-logo-dot{width:12px;height:12px;background:var(--ember);border-radius:50%;}
.login-sub{font-size:10px;color:var(--smoke);letter-spacing:0.3em;text-transform:uppercase;margin-bottom:48px;font-family:var(--fn);}
.login-title{font-size:12px;color:var(--mist);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:20px;}
.role-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;width:100%;max-width:560px;}
.role-card {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  padding:24px 20px;
  cursor:pointer;
  transition:all 0.2s;
  text-align:center;
}
.role-card:hover{background:rgba(255,255,255,0.08);border-color:var(--ember);transform:translateY(-2px);}
.role-icon{font-size:28px;margin-bottom:12px;}
.role-name{font-size:13px;color:var(--white);font-weight:500;letter-spacing:0.05em;}
.role-desc{font-size:10px;color:var(--smoke);margin-top:6px;line-height:1.5;letter-spacing:0.04em;}

/* ── APP SHELL ── */
#appShell{display:none;flex-direction:column;min-height:100vh;}

/* ── HEADER ── */
.header{
  background:var(--char);
  height:52px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid #111;
}
.logo{font-family:var(--fs);font-size:20px;font-weight:300;color:var(--cream);display:flex;align-items:center;gap:10px;letter-spacing:0.15em;text-transform:uppercase;}
.logo-dot{width:8px;height:8px;background:var(--ember);border-radius:50%;flex-shrink:0;}
.header-right{display:flex;align-items:center;gap:14px;}
.sync-info{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--smoke);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.sync-dot.syncing{background:var(--gold);animation:blink 0.8s infinite;}
.sync-dot.error{background:var(--ember);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.role-badge{font-size:10px;color:var(--smoke);letter-spacing:0.08em;text-transform:uppercase;border:1px solid var(--ash);padding:3px 10px;}
.btn{background:transparent;border:1px solid var(--ash);color:var(--mist);font-family:var(--fn);font-size:11px;padding:6px 14px;cursor:pointer;letter-spacing:0.07em;transition:all 0.15s;}
.btn:hover{border-color:var(--ember);color:var(--ember);}
.btn:disabled{opacity:0.4;pointer-events:none;}
.btn.primary{background:var(--ember);border-color:var(--ember);color:var(--white);}
.btn.primary:hover{background:#a84810;border-color:#a84810;}
.btn.ghost{border-color:transparent;color:var(--smoke);}
.btn.ghost:hover{color:var(--ember);border-color:transparent;}

/* ── NAV ── */
.nav{
  background:var(--black);
  display:flex;
  align-items:center;
  padding:0 24px;
  border-bottom:1px solid #111;
  overflow-x:auto;
}
.nav-btn{
  background:transparent;
  border:none;
  font-family:var(--fn);
  font-size:11px;
  color:var(--smoke);
  padding:14px 18px;
  cursor:pointer;
  letter-spacing:0.08em;
  text-transform:uppercase;
  border-bottom:2px solid transparent;
  transition:all 0.15s;
  white-space:nowrap;
}
.nav-btn:hover{color:var(--mist);}
.nav-btn.active{color:var(--ember);border-bottom-color:var(--ember);}

/* ── MAIN ── */
.main{flex:1;padding:24px;}

/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px;}

.dash-card{background:var(--white);border:1px solid var(--fog);}
.dash-card-header{padding:14px 18px 10px;border-bottom:1px solid var(--fog);display:flex;align-items:center;justify-content:space-between;}
.dash-card-title{font-size:10px;color:var(--smoke);letter-spacing:0.1em;text-transform:uppercase;}
.dash-card-body{padding:18px;}

.big-number{font-family:var(--fs);font-size:52px;font-style:italic;font-weight:300;line-height:1;}
.big-label{font-size:10px;color:var(--smoke);letter-spacing:0.1em;text-transform:uppercase;margin-top:6px;}

.big-number.c-ember{color:var(--ember);}
.big-number.c-gold{color:var(--gold);}
.big-number.c-green{color:var(--green);}
.big-number.c-blue{color:var(--blue);}
.big-number.c-smoke{color:var(--smoke);}

/* Semáforo */
.semaforo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.sem-block{padding:16px 12px;text-align:center;border:1px solid;}
.sem-block.verde{background:var(--green-l);border-color:#70b08044;}
.sem-block.amarillo{background:var(--gold-l);border-color:#d4a04044;}
.sem-block.rojo{background:var(--red-l);border-color:#e08080 44;}
.sem-num{font-family:var(--fs);font-size:36px;font-style:italic;font-weight:300;line-height:1;}
.sem-block.verde .sem-num{color:var(--green);}
.sem-block.amarillo .sem-num{color:var(--gold);}
.sem-block.rojo .sem-num{color:var(--red);}
.sem-lbl{font-size:10px;margin-top:4px;letter-spacing:0.08em;text-transform:uppercase;}
.sem-block.verde .sem-lbl{color:#2a6a3a;}
.sem-block.amarillo .sem-lbl{color:#8a5800;}
.sem-block.rojo .sem-lbl{color:var(--red);}
.sem-sub{font-size:9px;margin-top:2px;color:inherit;opacity:0.7;}
.sem-selected{outline:2px solid;outline-offset:-2px;}
.sem-block.verde.sem-selected{outline-color:var(--green);}
.sem-block.amarillo.sem-selected{outline-color:var(--gold);}
.sem-block.rojo.sem-selected{outline-color:var(--red);}

/* Pedidos urgentes */
.urgentes-list{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;}
.urgente-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--red-l);border:1px solid #e0808044;}
.urgente-dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;}
.urgente-info{flex:1;min-width:0;}
.urgente-cliente{font-size:12px;font-weight:500;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.urgente-detail{font-size:10px;color:var(--ash);margin-top:2px;}
.urgente-dias{font-size:11px;color:var(--red);font-weight:500;white-space:nowrap;}

/* Estado resumen row */
.estados-row{display:flex;gap:0;border:1px solid var(--fog);}
.estado-block{flex:1;padding:20px 16px;text-align:center;border-right:1px solid var(--fog);}
.estado-block:last-child{border-right:none;}
.estado-n{font-family:var(--fs);font-size:32px;font-style:italic;font-weight:300;line-height:1;}
.estado-l{font-size:10px;color:var(--smoke);letter-spacing:0.1em;text-transform:uppercase;margin-top:4px;}

/* ── LOADING/EMPTY ── */
.state-box{text-align:center;padding:60px 24px;color:var(--smoke);}
.spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--fog);border-top-color:var(--ember);border-radius:50%;animation:spin 0.75s linear infinite;margin-bottom:14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.state-big{font-family:var(--fs);font-size:48px;font-style:italic;color:var(--mist);}
.state-msg{font-size:12px;margin-top:8px;line-height:1.6;}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--char);color:var(--fog);font-family:var(--fn);font-size:12px;padding:13px 20px;border-left:3px solid var(--ember);opacity:0;transform:translateY(8px);transition:all 0.25s;pointer-events:none;z-index:999;max-width:320px;line-height:1.5;}
#toast.show{opacity:1;transform:translateY(0);}
#toast.success{border-left-color:var(--green);}
#toast.warning{border-left-color:var(--gold);}

/* ── PLACEHOLDER MÓDULOS ── */
.module-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:var(--smoke);text-align:center;}
.module-placeholder .big{font-family:var(--fs);font-size:40px;font-style:italic;color:var(--mist);margin-bottom:12px;}
.module-placeholder p{font-size:12px;line-height:1.6;}

.stat{display:flex;flex-direction:column;gap:2px;}
.stat-val{font-family:var(--fs);font-size:26px;font-weight:300;font-style:italic;color:var(--black);line-height:1;}
.stat-lbl{font-size:10px;color:var(--smoke);letter-spacing:0.1em;text-transform:uppercase;margin-top:3px;}

/* ── PROGRAMACIÓN ── */
.cal-grid{display:flex;gap:8px;overflow-x:auto;align-items:flex-start;padding-bottom:8px;}
.cal-grid.cal-mes{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-grid.cal-semana{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.cal-grid.cal-dia{display:grid;grid-template-columns:1fr;gap:8px;max-width:480px;}

.cal-col{background:var(--white);border:1px solid var(--fog);min-height:200px;min-width:0;}
.cal-col.cal-today{border-color:var(--ember);}
.cal-col.cal-weekend{background:#f8f8f0;}
.cal-col.cal-drop-active{border-color:var(--blue);background:var(--blue-l);}

.cal-col-header{padding:8px 10px 6px;border-bottom:1px solid var(--fog);display:flex;align-items:center;justify-content:space-between;}
.cal-day-label{font-size:11px;font-weight:500;color:var(--ash);letter-spacing:0.04em;}
.cal-col.cal-today .cal-day-label{color:var(--ember);}

.cal-cap-bar{height:4px;background:var(--fog);margin:0 10px 0;border-radius:2px;overflow:hidden;}
.cal-col .cal-cap-bar{margin:4px 10px;}

.cal-col-body{padding:8px;display:flex;flex-direction:column;gap:6px;min-height:120px;}

.cal-drop-hint{font-size:10px;color:var(--mist);text-align:center;padding:16px 8px;letter-spacing:0.06em;border:1px dashed var(--fog);margin:4px 0;}
.cal-drop-hint-mes{font-size:16px;color:var(--mist);text-align:center;line-height:1;}

.prog-card{background:var(--paper);border:1px solid var(--fog);padding:8px 10px;cursor:grab;transition:box-shadow 0.15s,opacity 0.15s;}
.prog-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.prog-card:active{cursor:grabbing;}
.prog-card.prog-done{background:var(--green-l);border-color:#70b08044;opacity:0.85;}
.prog-card.prog-queue{background:var(--white);margin-bottom:6px;}

.prog-done-btn{background:transparent;border:1px solid var(--green);color:var(--green);font-family:var(--fn);font-size:10px;padding:3px 10px;cursor:pointer;letter-spacing:0.06em;transition:all 0.15s;width:100%;}
.prog-done-btn:hover{background:var(--green);color:white;}

/* Mes */
.cal-mes-header{background:var(--char);color:var(--smoke);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:7px 8px;text-align:center;}
.cal-mes-cell{background:var(--white);border:1px solid var(--fog);padding:6px;min-height:90px;transition:background 0.1s;}
.cal-mes-cell.cal-today{border-color:var(--ember);}
.cal-mes-cell.cal-weekend{background:#f8f8f0;}
.cal-mes-cell.cal-othermonth{opacity:0.4;}
.cal-mes-cell.cal-drop-active{background:var(--blue-l);border-color:var(--blue);}
.cal-mes-day-num{font-size:12px;color:var(--ash);font-weight:500;}
.cal-mes-day-num.cal-today-num{color:var(--ember);}
.cal-mes-pill{font-size:10px;background:var(--fog);padding:2px 5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:grab;border-radius:2px;}
.cal-mes-pill:active{cursor:grabbing;}
.cal-mes-pill.cal-mes-pill-done{background:var(--green-l);color:var(--green);}

/* ── MODAL DETALLE ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(28,28,24,0.55);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--white);border:1px solid var(--mist);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;}
.modal-header{background:var(--char);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.modal-header-title{font-family:var(--fs);font-size:17px;font-style:italic;font-weight:300;color:var(--white);}
.modal-close{background:none;border:none;color:var(--smoke);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;}
.modal-close:hover{color:var(--fog);}
.modal-body{padding:20px;}
.modal-row{display:flex;gap:0;border-bottom:1px solid var(--fog);}
.modal-row:last-child{border-bottom:none;}
.modal-lbl{font-size:10px;color:var(--smoke);letter-spacing:0.09em;text-transform:uppercase;padding:10px 12px;min-width:140px;flex-shrink:0;}
.modal-val{font-size:12px;color:var(--black);padding:10px 12px;flex:1;word-break:break-word;line-height:1.5;}
.modal-val.big{font-family:var(--fs);font-size:20px;font-style:italic;font-weight:300;}

/* ── KANBAN DESPACHO ── */
.kanban-board{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;align-items:start;}
.kanban-col{background:var(--fog);border:1px solid var(--mist);min-height:200px;}
.kanban-col-header{padding:10px 14px;border-bottom:1px solid var(--mist);display:flex;align-items:center;justify-content:space-between;}
.kanban-col-title{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;}
.kanban-col-count{font-size:10px;color:var(--smoke);}
.kanban-col-body{padding:8px;display:flex;flex-direction:column;gap:6px;min-height:120px;}
.kanban-col.drop-active{background:var(--blue-l);border-color:var(--blue);}

.kanban-card{background:var(--white);border:1px solid var(--fog);padding:10px 12px;cursor:grab;transition:box-shadow 0.15s;}
.kanban-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.kanban-card:active{cursor:grabbing;}
.kanban-card.dragging{opacity:0.4;}
.kanban-card-client{font-size:12px;font-weight:500;color:var(--black);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kanban-card-detail{font-size:10px;color:var(--ash);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kanban-card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.kanban-drop-hint{font-size:10px;color:var(--mist);text-align:center;padding:20px 8px;letter-spacing:0.06em;border:1px dashed var(--mist);}

@media(max-width:1000px){.kanban-board{grid-template-columns:repeat(3,1fr);}}
@media(max-width:700px){.kanban-board{grid-template-columns:repeat(2,1fr);}}
@media(max-width:500px){.kanban-board{grid-template-columns:1fr;}}

/* ── GASTOS ── */
.gastos-form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.gastos-form-grid .span2{grid-column:span 2;}
.gastos-form-grid .span3{grid-column:span 3;}
.g-label{font-size:10px;color:var(--smoke);letter-spacing:0.09em;text-transform:uppercase;margin-bottom:4px;display:block;}
.g-input,.g-select{width:100%;background:var(--paper);border:1px solid var(--mist);font-family:var(--fn);font-size:12px;padding:7px 10px;color:var(--black);outline:none;transition:border-color 0.15s;}
.g-input:focus,.g-select:focus{border-color:var(--ash);}
.g-table{width:100%;border-collapse:collapse;font-size:12px;}
.g-table th{background:var(--char);padding:9px 12px;text-align:left;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--smoke);font-weight:400;white-space:nowrap;}
.g-table td{padding:9px 12px;border-bottom:1px solid var(--fog);color:var(--char);vertical-align:middle;}
.g-table tr:hover td{background:var(--fog);}
.g-monto{font-weight:500;color:var(--black);text-align:right;white-space:nowrap;}
.g-cat-pill{font-size:10px;padding:2px 8px;background:var(--blue-l);color:var(--blue);border:1px solid #6090c033;white-space:nowrap;}

@media(max-width:700px){.gastos-form-grid{grid-template-columns:1fr 1fr;}.gastos-form-grid .span2,.gastos-form-grid .span3{grid-column:span 2;}}

/* ── MÓDULO PLACEHOLDER ── */
.module-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:var(--smoke);text-align:center;}
.module-placeholder .big{font-family:var(--fs);font-size:40px;font-style:italic;color:var(--mist);margin-bottom:12px;}
.module-placeholder p{font-size:12px;line-height:1.6;}

@media(max-width:600px){
  .main{padding:14px;}
  .semaforo-grid{grid-template-columns:repeat(3,1fr);}
  .sem-num{font-size:28px;}
  .dash-grid{grid-template-columns:1fr;}
  .estados-row{flex-wrap:wrap;}
  .estado-block{flex:1 1 45%;border-bottom:1px solid var(--fog);}
  .header{padding:0 14px;}
  .nav{padding:0 8px;}
  .nav-btn{padding:12px 12px;font-size:10px;}
  .cal-grid.cal-semana{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-logo">
    <div class="login-logo-dot"></div>
    BosqueNegro
  </div>
  <div class="login-sub">Sistema de Gestión</div>
  <div class="login-title">Selecciona tu perfil</div>
  <div class="role-grid">
    <div class="role-card" onclick="login('admin')">
      <div class="role-icon">◈</div>
      <div class="role-name">Administrador</div>
      <div class="role-desc">Acceso completo a todos los módulos</div>
    </div>
    <div class="role-card" onclick="login('produccion')">
      <div class="role-icon">◎</div>
      <div class="role-name">Producción</div>
      <div class="role-desc">Programación y registro de producción</div>
    </div>
    <div class="role-card" onclick="login('despacho')">
      <div class="role-icon">◇</div>
      <div class="role-name">Despacho</div>
      <div class="role-desc">Gestión de entregas y despachos</div>
    </div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════════════ -->
<div id="appShell">

  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      BosqueNegro
      <span style="font-family:var(--fn);font-size:11px;font-style:normal;color:var(--smoke);margin-left:4px;" id="headerModulo"></span>
    </div>
    <div class="header-right">
      <div class="sync-info">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncLabel">—</span>
      </div>
      <span class="role-badge" id="roleBadge"></span>
      <button class="btn" onclick="syncNow()">↻</button>
      <button class="btn ghost" onclick="logout()" style="font-size:10px;">Salir</button>
    </div>
  </div>

  <nav class="nav" id="mainNav"></nav>

  <div class="main" id="mainContent">
    <div class="state-box"><div class="spinner"></div></div>
  </div>

</div>

<div id="toast"></div>

<!-- ══ MODAL DETALLE PEDIDO ══════════════════════════════════════ -->
<div class="modal-overlay" id="modalDetalle" onclick="closeModalDetalle(event)">
  <div class="modal-box">

// ─── AUTH ─────────────────────────────────────────────────────────
function b64url(str){return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
function b64urlBuf(buf){let b='';const a=new Uint8Array(buf);for(let i=0;i<a.length;i++)b+=String.fromCharCode(a[i]);return btoa(b).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function pemToKey(pem){
  const b64=pem.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
  const bin=atob(b64);const buf=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
  return crypto.subtle.importKey('pkcs8',buf.buffer,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
}
async function getToken(){
  if(accessToken&&Date.now()<tokenExpiry)return accessToken;
  const now=Math.floor(Date.now()/1000);
  const h=b64url(JSON.stringify({alg:'RS256',typ:'JWT'}));
  const c=b64url(JSON.stringify({iss:CREDS.client_email,scope:'https://www.googleapis.com/auth/spreadsheets',aud:CREDS.token_uri,exp:now+3600,iat:now}));
  const key=await pemToKey(CREDS.private_key);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,new TextEncoder().encode(h+'.'+c));
  const jwt=h+'.'+c+'.'+b64urlBuf(sig);
  const res=await fetch(CREDS.token_uri,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`});
  const data=await res.json();
  if(!data.access_token)throw new Error('Auth: '+JSON.stringify(data));
  accessToken=data.access_token;tokenExpiry=Date.now()+(data.expires_in-60)*1000;
  return accessToken;
}

function normalizeEstado(raw){
  const v=(raw||'').trim().toLowerCase();
  if(v==='entregado'||v==='entregada')return'Entregado';
  if(v==='terminado'||v==='terminada')return'Terminado';
  if(v==='programado'||v==='programada'||v==='en producción'||v==='en produccion')return'Programado';
  if(v==='pendiente')return'Pendiente';
  if(v==='envío starken'||v==='envio starken'||v==='starken')return'Envío Starken';
  if(v==='envío propio'||v==='envio propio'||v==='propio')return'Envío Propio';
  if(v==='retiro en taller'||v==='retiro taller'||v==='retiro')return'Retiro en Taller';
  if(raw&&raw.trim())return raw.trim();
  return'Pendiente';
}

function parseDate(str){
  if(!str)return null;
  const s=str.trim();
  let y,m,d;
  if(/^\d{4}-\d{2}-\d{2}/.test(s)){
    // YYYY-MM-DD → construir con hora local para evitar desfase UTC
    [y,m,d]=s.split('-').map(Number);
  } else if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(s)){
    const parts=s.split('/');
    d=Number(parts[0]);m=Number(parts[1]);y=Number(parts[2]);
  } else { return null; }
  const dt=new Date(y,m-1,d,0,0,0,0);
  return isNaN(dt.getTime())?null:dt;
}

function diasHabilesDesde(fechaStr){
  const fecha=parseDate(fechaStr);
  if(!fecha)return null;
  const hoy=new Date();
  const hoyLocal=new Date(hoy.getFullYear(),hoy.getMonth(),hoy.getDate(),0,0,0,0);
  fecha.setHours(0,0,0,0);
  if(fecha>hoyLocal)return 0;
  let dias=0,cur=new Date(fecha);
  while(cur<hoyLocal){
    cur.setDate(cur.getDate()+1);
    const dow=cur.getDay();
    if(dow!==0&&dow!==6)dias++;
  }
  return dias;
}

function semColor(dias){
  if(dias===null)return'smoke';
  if(dias<=6)return'verde';
  if(dias<=10)return'amarillo';
  return'rojo';
}

function esc(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function todayISO(){

function buildRanking(lista){
  const rankingMap = {};
  lista.forEach(r => {
    const prod = r[C.SUBPRODUCTO]||r[C.CATEGORIA]||'Sin clasificar';
    const term = r[C.TERMINACION]||'';
    const key  = term?`${prod} · ${term}`:prod;
    rankingMap[key]=(rankingMap[key]||0)+(parseInt(r[C.CANTIDAD])||1);
  });
  const entries = Object.entries(rankingMap).sort((a,b)=>b[1]-a[1]).slice(0,12);
  const maxVal  = entries.length?entries[0][1]:1;
  const totalU  = lista.reduce((a,r)=>a+(parseInt(r[C.CANTIDAD])||1),0);
  if(!entries.length) return {html:'<div style="font-size:12px;color:var(--smoke);padding:16px;text-align:center;">Sin datos</div>',total:0,count:lista.length};
  const html = entries.map(([nombre,cant],i)=>{
    const pct=Math.round(cant/maxVal*100);
    const bc=i===0?'var(--ember)':i<3?'var(--gold)':'var(--mist)';
    return `<div style="display:flex;align-items:center;gap:10px;padding:7px 16px;border-bottom:1px solid var(--fog);">
      <span style="font-size:10px;color:var(--smoke);min-width:16px;text-align:right;">${i+1}</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:11px;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;">${esc(nombre)}</div>
        <div style="height:5px;background:var(--fog);border-radius:2px;overflow:hidden;">
          <div style="width:${pct}%;height:100%;background:${bc};border-radius:2px;transition:width 0.4s;"></div>
        </div>
      </div>
      <span style="font-size:13px;font-weight:500;color:var(--black);min-width:28px;text-align:right;">${cant}</span>
    </div>`;
  }).join('');
  return {html,total:totalU,count:lista.length};
}

// ─── PROGRAMACIÓN ────────────────────────────────────────────────
// Capacidad diaria por producto (provisional)
const CAPACIDAD = {
  hanoi: 10,
  default: 3
};

let progVista = 'semana';
let progFecha = (()=>{ const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),d.getDate(),0,0,0,0); })();

let dragData = null; // {rowIdx, fromDate}

function getCapacidadProducto(r){
  const sub = (r[C.SUBPRODUCTO]||'').toLowerCase();
  const cat = (r[C.CATEGORIA]||'').toLowerCase();
  if(sub.includes('hanoi')||cat.includes('hanoi')) return CAPACIDAD.hanoi;
  return CAPACIDAD.default;
}

function isoDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function addDays(d, n){
  const r = new Date(d);
  r.setDate(r.getDate()+n);
  return r;
}

function startOfWeek(d){
  const r = new Date(d);
  const day = r.getDay(); // 0=Dom
  const diff = day === 0 ? -6 : 1 - day; // lunes
  r.setDate(r.getDate()+diff);
  r.setHours(0,0,0,0);
  return r;
}

function startOfMonth(d){
  return new Date(d.getFullYear(), d.getMonth(), 1);
}

function formatDayHeader(d){
  const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`;
}

function formatMonthYear(d){
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return `${meses[d.getMonth()]} ${d.getFullYear()}`;
}

// Normalizar cualquier fecha a formato YYYY-MM-DD para comparar
function normalizeDateStr(str){
  if(!str||!str.trim()) return '';
  const d = parseDate(str.trim());
  if(!d) return str.trim();
  return isoDate(d);
}

// Calcular carga total de capacidad para una fecha
function getCargaDia(dateStr, rows){
  const programados = rows.filter(r =>
    normalizeDateStr(r[C.FECHA_PROD]) === dateStr &&
    ['Pendiente','Programado'].includes(normalizeEstado(r[C.ESTADO]))
  );
  const total = programados.reduce((acc, r) => acc + (parseInt(r[C.CANTIDAD])||1), 0);
  const maxCap = 10;
  return { total, maxCap, pct: Math.min(100, Math.round(total/maxCap*100)) };
}

function matchesProgFiltro(r){
  if(!progFiltroQ) return true;
  const q = progFiltroQ.toLowerCase();
  return (r[C.CLIENTE]||'').toLowerCase().includes(q) ||
         (r[C.OT]||'').toLowerCase().includes(q);
}

function renderDiaCol(dateStr, data, isToday){
  const d = parseDate(dateStr);
  const dow = d ? d.getDay() : -1;
  const isWeekend = dow===0||dow===6;
  const pedidosDia = data
    .map((r,i)=>({r,i:i+1}))
    .filter(({r}) =>
      normalizeDateStr(r[C.FECHA_PROD])===dateStr &&
      ['Pendiente','Programado','Terminado'].includes(normalizeEstado(r[C.ESTADO])) &&
      matchesProgFiltro(r)
    );
  const carga = getCargaDia(dateStr, data);

  const barColor = carga.pct>=100?'var(--red)':carga.pct>=70?'var(--gold)':'var(--green)';

  return `<div class="cal-col${isToday?' cal-today':''}${isWeekend?' cal-weekend':''}"
    data-date="${dateStr}"
    ondragover="onDayDragOver(event)"
    ondragleave="onDayDragLeave(event)"
    ondrop="onDayDrop(event,'${dateStr}')">
    <div class="cal-col-header">
      <span class="cal-day-label">${formatDayHeader(d)}</span>
      ${isToday?'<span style="font-size:9px;color:var(--ember);letter-spacing:0.08em;">HOY</span>':''}
    </div>
    <div class="cal-cap-bar" title="Carga: ${carga.total} uds">
      <div style="width:${carga.pct}%;background:${barColor};height:100%;transition:width 0.3s;"></div>
    </div>
    <div class="cal-col-body" id="day-${dateStr}">
      ${pedidosDia.length===0
        ? '<div class="cal-drop-hint">Arrastra aquí</div>'
        : pedidosDia.map(({r,i})=>renderProgCard(r,i)).join('')
      }
    </div>
  </div>`;
}

function getDatesForVista(){
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  if(progVista==='dia'){
    return [isoDate(progFecha)];
  } else if(progVista==='semana'){
    const lunes = startOfWeek(progFecha);
    return Array.from({length:7},(_,i)=>isoDate(addDays(lunes,i)));
  } else {
    // mes: semanas completas que cubran el mes
    const inicio = startOfMonth(progFecha);
    const lunes = startOfWeek(inicio);
    const fin = new Date(progFecha.getFullYear(), progFecha.getMonth()+1, 0);
    const dates = [];
    let cur = new Date(lunes);
    while(cur <= fin || dates.length%7!==0){
      dates.push(isoDate(cur));
      cur = addDays(cur,1);
      if(dates.length>42) break;
    }
    return dates;
  }
}

function renderCalMes(dates, data, hoy){
  // Encabezados de días
  const headers = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d=>
    `<div class="cal-mes-header">${d}</div>`).join('');

  const cols = dates.map(d=>{
    const date = parseDate(d);
    const dow  = date ? date.getDay() : 0;
    const isWeekend = dow===0||dow===6;
    const pedidosDia = data
      .filter(r => normalizeDateStr(r[C.FECHA_PROD])===d && ['Pendiente','Programado','Terminado'].includes(normalizeEstado(r[C.ESTADO])));
    const carga = getCargaDia(d, data);
    const barColor = carga.pct>=100?'var(--red)':carga.pct>=70?'var(--gold)':'var(--green)';
    const isCurrentMonth = date && date.getMonth()===progFecha.getMonth();
    return `<div class="cal-mes-cell${d===hoy?' cal-today':''}${isWeekend?' cal-weekend':''}${!isCurrentMonth?' cal-othermonth':''}"
      data-date="${d}"
      ondragover="onDayDragOver(event)"
      ondragleave="onDayDragLeave(event)"
      ondrop="onDayDrop(event,'${d}')">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;">
        <span class="cal-mes-day-num${d===hoy?' cal-today-num':''}">${date?date.getDate():''}</span>
        ${carga.total>0?`<span style="font-size:9px;color:var(--smoke)">${carga.total}u</span>`:''}
      </div>
      ${carga.total>0?`<div class="cal-cap-bar" style="margin-bottom:4px;"><div style="width:${carga.pct}%;background:${barColor};height:100%;"></div></div>`:''}
      <div style="display:flex;flex-direction:column;gap:2px;min-height:24px;" id="day-${d}">
        ${pedidosDia.slice(0,3).map(r=>{
          const idx = allRows.indexOf(r);
          const producido = r[C.FECHA_PROD_REAL]&&r[C.FECHA_PROD_REAL].trim();
          const dias = diasHabilesDesde(r[C.FECHA_INGRESO]);
          const sem  = semColor(dias);
          const semColors={verde:'var(--green)',amarillo:'var(--gold)',rojo:'var(--red)'};
          return `<div class="cal-mes-pill${producido?' cal-mes-pill-done':''}"
            draggable="true"
            data-idx="${idx}"
            ondragstart="onCardDragStart(event,${idx})"
            ondragend="onCardDragEnd(event)"
            style="border-left:2px solid ${semColors[sem]||'var(--smoke)'};"
            title="${esc(r[C.CLIENTE]||'')} · ${esc(r[C.SUBPRODUCTO]||r[C.CATEGORIA]||'')}">
            ${esc((r[C.CLIENTE]||'').split(' ')[0])}${producido?' ✓':''}
          </div>`;
        }).join('')}
        ${pedidosDia.length>3?`<div style="font-size:9px;color:var(--smoke);padding:1px 3px;">+${pedidosDia.length-3} más</div>`:''}
        ${pedidosDia.length===0?'<div class="cal-drop-hint-mes">+</div>':''}
      </div>
    </div>`;
  });

  return headers + cols.join('');
}

function setProgVista(v){
  progVista = v;
  renderProgramacion();
}

function navProg(dir){
  if(progVista==='dia'){
    progFecha = addDays(progFecha, dir);
  } else if(progVista==='semana'){
    progFecha = addDays(progFecha, dir*7);
  } else {
    progFecha = new Date(progFecha.getFullYear(), progFecha.getMonth()+dir, 1);
  }
  renderProgramacion();
}

// ── DRAG & DROP ──────────────────────────────────────────────────
function onCardDragStart(e, rowIdx){
  dragData = { rowIdx };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', String(rowIdx));
  setTimeout(()=>{ if(e.target) e.target.style.opacity='0.4'; }, 0);
}

function onCardDragEnd(e){
  if(e.target) e.target.style.opacity='';
  dragData = null;
  document.querySelectorAll('.cal-drop-active').forEach(el=>el.classList.remove('cal-drop-active'));
}

function onDayDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const col = e.currentTarget;
  col.classList.add('cal-drop-active');
}

function onDayDragLeave(e){
  if(!e.currentTarget.contains(e.relatedTarget)){
    e.currentTarget.classList.remove('cal-drop-active');
  }
}

async function onDayDrop(e, dateStr){
  e.preventDefault();
  e.stopPropagation();
  // Obtener fecha del elemento con data-date más cercano (por si el drop cae en hijo)
  let target = e.target;
  while(target && !target.dataset.date) target = target.parentElement;
  const finalDate = (target && target.dataset.date) ? target.dataset.date : dateStr;

  document.querySelectorAll('.cal-drop-active').forEach(el=>el.classList.remove('cal-drop-active'));

  const rowIdx = parseInt(e.dataTransfer.getData('text/plain'));
  if(isNaN(rowIdx)||!allRows[rowIdx]) return;

  const oldDate = allRows[rowIdx][C.FECHA_PROD]||'';
  if(normalizeDateStr(oldDate)===finalDate) return;

  while(allRows[rowIdx].length < 14) allRows[rowIdx].push('');
  const estadoAnterior = normalizeEstado(allRows[rowIdx][C.ESTADO]);
  allRows[rowIdx][C.FECHA_PROD] = finalDate;
  if(estadoAnterior === 'Pendiente'){
    allRows[rowIdx][C.ESTADO] = 'Programado';
  }

  renderProgramacion();
  showToast('Guardando en Sheets...','warning');

  try{
    const sheetRow = rowIdx+1;
    await writeRange(`${SHEET_NAME}!G${sheetRow}`, [[finalDate]]);
    if(estadoAnterior === 'Pendiente'){
      await writeRange(`${SHEET_NAME}!F${sheetRow}`, [['Programado']]);
    }
    showToast('✓ Pedido reprogramado','success');
  }catch(err){
    allRows[rowIdx][C.FECHA_PROD] = oldDate;
    if(estadoAnterior === 'Pendiente') allRows[rowIdx][C.ESTADO] = 'Pendiente';
    renderProgramacion();
    showToast('Error al guardar: '+err.message);
  }
}

// ── MARCAR PRODUCIDO ─────────────────────────────────────────────
async function marcarProducido(e, rowIdx){
  e.stopPropagation();
  if(!allRows[rowIdx]) return;

  const hoy = todayISO();
  const clienteNombre = allRows[rowIdx][C.CLIENTE]||'Pedido';

  // Actualizar local
  while(allRows[rowIdx].length<14) allRows[rowIdx].push('');
  allRows[rowIdx][C.ESTADO]         = 'Terminado';
  allRows[rowIdx][C.FECHA_PROD_REAL]= hoy;

  renderProgramacion();
  showToast('Guardando...','warning');

  try{
    const sheetRow = rowIdx+1;
    await writeRange(`${SHEET_NAME}!F${sheetRow}`, [['Terminado']]);
    await writeRange(`${SHEET_NAME}!M${sheetRow}`, [[hoy]]);
    showToast(`✓ ${esc(clienteNombre)} marcado como producido`,'success');
  }catch(err){
    allRows[rowIdx][C.ESTADO]          = 'Programado';
    allRows[rowIdx][C.FECHA_PROD_REAL] = '';
    renderProgramacion();
    showToast('Error: '+err.message);
  }
}

async function onKanbanDrop(e, nuevoEstado){
  e.preventDefault();
  e.currentTarget.classList.remove('drop-active');

  const rowIdx = parseInt(e.dataTransfer.getData('text/plain'));
  if(isNaN(rowIdx)||!allRows[rowIdx]) return;

  const estadoActual = normalizeEstado(allRows[rowIdx][C.ESTADO]);
  if(estadoActual === nuevoEstado) return;

  // Validar flujo: no se puede mover Entregado hacia atrás
  const orden = ['Terminado','Envío Starken','Envío Propio','Entregado'];
  const idxActual = orden.indexOf(estadoActual);
  const idxNuevo  = orden.indexOf(nuevoEstado);
  if(idxActual === 3 && idxNuevo < 3){
    showToast('Un pedido entregado no puede retroceder','warning');
    return;
  }

  // Actualizar local
  while(allRows[rowIdx].length<15) allRows[rowIdx].push('');
  const estadoPrev = allRows[rowIdx][C.ESTADO];
  allRows[rowIdx][C.ESTADO] = nuevoEstado;
  if(nuevoEstado==='Entregado' && !allRows[rowIdx][C.FECHA_DESPACHO_REAL]){
    allRows[rowIdx][C.FECHA_DESPACHO_REAL] = todayISO();
  }

  renderDespacho();
  showToast('Guardando...','warning');

  try{
    const sheetRow = rowIdx+1;
    await writeRange(`${SHEET_NAME}!F${sheetRow}`, [[nuevoEstado]]);
    if(nuevoEstado==='Entregado'){
      await writeRange(`${SHEET_NAME}!N${sheetRow}`, [[allRows[rowIdx][C.FECHA_DESPACHO_REAL]]]);
    }
    showToast(`✓ ${esc(allRows[rowIdx][C.CLIENTE]||'Pedido')} → ${nuevoEstado}`,'success');
  }catch(err){
    allRows[rowIdx][C.ESTADO] = estadoPrev;
    renderDespacho();
    showToast('Error: '+err.message);
  }
}

// ─── REPORTERÍA ──────────────────────────────────────────────────
let repPeriodo = 'semana'; // 'semana' | 'mes'
let repChart1 = null, repChart2 = null, repChart3 = null;

function getWeekKey(dateStr){
  const d = parseDate(dateStr);
  if(!d) return null;
  const lunes = startOfWeek(d);
  return isoDate(lunes);
}

function getMonthKey(dateStr){
  const d = parseDate(dateStr);
  if(!d) return null;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function labelFromKey(key, periodo){
  if(!key) return '?';
  if(periodo==='mes'){
    const [y,m] = key.split('-');
    const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return `${meses[parseInt(m)-1]} ${y}`;
  } else {
    const d = parseDate(key);
    if(!d) return key;
    return `${d.getDate()}/${d.getMonth()+1}`;
  }
}

function buildChartData(rows, dateField, periodo, limit=12){
  const getKey = periodo==='mes' ? getMonthKey : getWeekKey;
  const counts = {};
  rows.forEach(r => {
    const k = getKey(r[dateField]);
    if(k) counts[k] = (counts[k]||0) + (parseInt(r[C.CANTIDAD])||1);
  });
  const keys = Object.keys(counts).sort().slice(-limit);
  return {
    labels: keys.map(k=>labelFromKey(k,periodo)),
    data:   keys.map(k=>counts[k])
  };
}

function buildTiemposData(rows, periodo, limit=12){
  const getKey = periodo==='mes' ? getMonthKey : getWeekKey;
  const grupos = {};
  rows.forEach(r => {
    const fProd = r[C.FECHA_PROD_REAL];
    const fIng  = r[C.FECHA_INGRESO];
    if(!fProd||!fIng) return;
    const dias = diasHabilesDesde2(fIng, fProd);
    if(dias===null||dias<0) return;
    const k = getKey(fProd);
    if(!k) return;
    if(!grupos[k]) grupos[k]={sum:0,cnt:0};
    grupos[k].sum += dias;
    grupos[k].cnt++;
  });
  const keys = Object.keys(grupos).sort().slice(-limit);
  return {
    labels: keys.map(k=>labelFromKey(k,periodo)),
    data:   keys.map(k=>Math.round(grupos[k].sum/grupos[k].cnt))
  };
}

// Días hábiles entre dos fechas
function diasHabilesDesde2(desde, hasta){
  const d1 = parseDate(desde);
  const d2 = parseDate(hasta);
  if(!d1||!d2) return null;
  d1.setHours(0,0,0,0); d2.setHours(0,0,0,0);
  if(d2<d1) return 0;
  let dias=0, cur=new Date(d1);
  while(cur<d2){
    cur.setDate(cur.getDate()+1);
    const dow=cur.getDay();
    if(dow!==0&&dow!==6) dias++;
  }
  return dias;
}

function destroyCharts(){
  [repChart1,repChart2,repChart3].forEach(c=>{ if(c){ try{c.destroy();}catch(e){} } });
  repChart1=repChart2=repChart3=null;

// Columnas pestaña Gastos (0-based)
const G = {
  FECHA:0, CENTRO:1, CATEGORIA:2, DETALLE:3,
  NETO:4, IVA:5, BRUTO:6, DESCRIPCION:7,
  MEDIO_PAGO:8, TIPO_DOC:9, NUM_DOC:10, DESTINATARIO:11
};

const GASTOS_CENTROS    = ['Operaciones','Administración','Ventas','Marketing','Producción','Otro'];
const GASTOS_CATEGORIAS = ['Insumos','Materiales','Servicios','Arriendo','Logística','Sueldos','Herramientas','Marketing','Contabilidad','Otro'];
const GASTOS_MEDIOS     = ['Transferencia','Efectivo','Tarjeta Crédito','Tarjeta Débito','Cheque','Otro'];
const GASTOS_TIPOS_DOC  = ['Factura','Boleta','Sin documento','Otro'];

let gastosPeriodoTipo = 'mes';  // 'mes' | 'custom'
let gastosPeriodoMes  = (() => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; })();
let gastosDesde       = '';
let gastosHasta       = '';
let gastosVista       = 'tabla'; // 'tabla' | 'form'
let gastoChartInst    = null;

function formatCLP(n){
  const num = parseInt(n)||0;
  return '$' + num.toLocaleString('es-CL');
}

function getGastosData(){
  const rows = allGastos.slice(1); // saltar header
  return rows.filter(r => r && r[G.FECHA]);
}

function filtrarPorPeriodo(rows){
  return rows.filter(r => {
    const d = parseDate(r[G.FECHA]);
    if(!d) return false;
    if(gastosPeriodoTipo === 'mes'){
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      return key === gastosPeriodoMes;
    } else {
      const desde = gastosDesde ? parseDate(gastosDesde) : null;
      const hasta = gastosHasta ? parseDate(gastosHasta) : null;
      if(desde) desde.setHours(0,0,0,0);
      if(hasta) hasta.setHours(23,59,59,999);
      if(desde && d < desde) return false;
      if(hasta && d > hasta)  return false;
      return true;
    }
  });
}

function calcGastoBruto(){
  const neto = parseInt(document.getElementById('gf_neto')?.value)||0;
  const iva  = parseInt(document.getElementById('gf_iva')?.value)||0;
  const brutoEl = document.getElementById('gf_bruto');
  if(brutoEl) brutoEl.value = neto + iva || '';
}

function setGastosPeriodo(tipo){
  gastosPeriodoTipo = tipo;
  renderGastos();
}

async function guardarGasto(){
  const fecha       = document.getElementById('gf_fecha')?.value;
  const centro      = document.getElementById('gf_centro')?.value;
  const categoria   = document.getElementById('gf_categoria')?.value;
  const detalle     = document.getElementById('gf_detalle')?.value?.trim();
  const neto        = document.getElementById('gf_neto')?.value;
  const iva         = document.getElementById('gf_iva')?.value;
  const bruto       = document.getElementById('gf_bruto')?.value;
  const descripcion = document.getElementById('gf_descripcion')?.value?.trim();
  const medio       = document.getElementById('gf_medio')?.value;
  const tipo_doc    = document.getElementById('gf_tipo_doc')?.value;
  const num_doc     = document.getElementById('gf_num_doc')?.value?.trim();
  const destinatario= document.getElementById('gf_destinatario')?.value?.trim();

  if(!fecha){ showToast('La fecha es requerida','warning'); return; }
  if(!detalle){ showToast('El detalle es requerido','warning'); return; }
  if(!neto && !bruto){ showToast('Ingresa al menos el monto neto o bruto','warning'); return; }

  // Calcular bruto si falta
  const netoN  = parseInt(neto)||0;
  const ivaN   = parseInt(iva)||0;
  const brutoN = parseInt(bruto)||netoN+ivaN;

  // Formatear fecha a dd/mm/yyyy para consistencia con datos existentes
  const d = parseDate(fecha);
  const fechaStr = d ? `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}` : fecha;

  const newRow = [fechaStr, centro, categoria, detalle, netoN||'', ivaN||'', brutoN, descripcion, medio, tipo_doc, num_doc, destinatario];

  const btn = document.getElementById('gf_saveBtn');
  if(btn){ btn.disabled=true; btn.textContent='Guardando...'; }

  showToast('Guardando en Sheets...','warning');
  try{
    await appendRowGastos(newRow);
    // Actualizar local
    allGastos.push(newRow);
    gastosVista = 'tabla';
    renderGastos();
    showToast('✓ Gasto registrado correctamente','success');
  }catch(err){
    if(btn){ btn.disabled=false; btn.textContent='Guardar gasto'; }
    showToast('Error: '+err.message);
  }
}
let toastT=null;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show'+(type?' '+type:'');
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(()=>{t.className='';},3500);
}

  const dias = diasHabilesDesde(r[C.FECHA_INGRESO])||0;
  const sem  = semColor(dias);

  document.getElementById('modalDetalleTitle').textContent =
    (r[C.CLIENTE]||'Sin nombre') + (r[C.OT] ? ' — OT ' + r[C.OT] : '');

  document.getElementById('modalDetalleBody').innerHTML = `
    <div class="modal-row">
      <div class="modal-lbl">Cliente</div>
      <div class="modal-val big">${esc(r[C.CLIENTE]||'—')}</div>
    </div>
    <div class="modal-row">
      <div class="modal-lbl">Estado</div>
      <div class="modal-val"><span class="badge badge-${estado}">${estado}</span>
        <span style="margin-left:10px;font-size:11px;color:${semColors[sem]||'var(--smoke)'};">${dias} días hábiles</span>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-lbl">OT</div>
      <div class="modal-val">${esc(r[C.OT]||'—')}</div>
    </div>
    <div class="modal-row">
      <div class="modal-lbl">Fecha ingreso</div>
      <div class="modal-val">${formatDateCL(r[C.FECHA_INGRESO])}</div>
    </div>
    <div class="modal-row">
      <div class="modal-lbl">Categoría</div>
      <div class="modal-val">${esc(r[C.CATEGORIA]||'—')}</div>
    </div>
    <div class="modal-row">
      <div class="modal-lbl">Subproducto</div>
      <div class="modal-val">${esc(r[C.SUBPRODUCTO]||'—')}</div>
    </div>
    <div class="modal-row">
      <div class="modal-lbl">Terminación</div>
      <div class="modal-val">${esc(r[C.TERMINACION]||'—')}</div>
    </div>
    <div class="modal-row">
      <div class="modal-lbl">Cantidad</div>
      <div class="modal-val">${esc(r[C.CANTIDAD]||'—')}</div>
    </div>
    <div class="modal-row">
      <div class="modal-lbl">Detalle ingreso</div>
      <div class="modal-val">${esc(r[C.DETALLE]||'—')}</div>
    </div>
    <div class="modal-row">
      <div class="modal-lbl">Observaciones</div>
      <div class="modal-val">${esc(r[C.OBSERVACIONES]||'—')}</div>
    </div>
    ${r[C.FECHA_PROD]?`<div class="modal-row"><div class="modal-lbl">F. programada</div><div class="modal-val">${formatDateCL(r[C.FECHA_PROD])}</div></div>`:''}
    ${r[C.FECHA_PROD_REAL]?`<div class="modal-row"><div class="modal-lbl">F. producción real</div><div class="modal-val">${formatDateCL(r[C.FECHA_PROD_REAL])}</div></div>`:''}
    ${r[C.FECHA_DESPACHO_REAL]?`<div class="modal-row"><div class="modal-lbl">F. despacho</div><div class="modal-val">${formatDateCL(r[C.FECHA_DESPACHO_REAL])}</div></div>`:''}
  `;
  document.getElementById('modalDetalle').classList.add('open');
}

function closeModalDetalleBtn(){
  document.getElementById('modalDetalle').classList.remove('open');
}
function closeModalDetalle(e){
  if(e.target===document.getElementById('modalDetalle'))
    document.getElementById('modalDetalle').classList.remove('open');
}
</script>
</body>
</html>
